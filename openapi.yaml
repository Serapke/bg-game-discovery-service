openapi: 3.0.3
info:
  title: Game Discovery API
  description: API for discovering board games and their expansions with BGG integration
  version: 1.0.0
  contact:
    name: API Support
servers:
  - url: http://localhost:3002
    description: Development server
  - url: https://api.gamediscovery.example.com
    description: Production server

paths:
  /api/v1/board_games:
    get:
      summary: Get or filter board games
      description: Retrieve all board games or filter by specific criteria. Can optionally filter a subset by providing IDs.
      operationId: getBoardGames
      tags:
        - Board Games
      parameters:
        - name: ids
          in: query
          description: Comma-separated list of board game IDs to filter from
          required: false
          schema:
            type: string
            example: "1,2,3"
        - name: player_count
          in: query
          description: Exact number of players the game must support
          required: false
          schema:
            type: integer
            minimum: 1
            example: 4
        - name: max_playing_time
          in: query
          description: Maximum playing time in minutes
          required: false
          schema:
            type: integer
            minimum: 1
            example: 60
        - name: game_types
          in: query
          description: Comma-separated game types to filter by
          required: false
          schema:
            type: string
            example: "strategy,family"
          style: form
          explode: false
        - name: min_rating
          in: query
          description: Minimum rating threshold (0-10)
          required: false
          schema:
            type: number
            format: float
            minimum: 0
            maximum: 10
            example: 7.0
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  board_games:
                    type: array
                    items:
                      $ref: '#/components/schemas/BoardGame'
                  total:
                    type: integer
                    example: 2
              examples:
                all_games:
                  summary: All board games
                  value:
                    board_games:
                      - id: 1
                        name: Catan
                        game_types: [strategy, family]
                        game_categories: [Economic, Negotiation]
                        min_players: 3
                        max_players: 4
                        min_playing_time: 60
                        max_playing_time: 90
                        rating: "7.2"
                        rating_count: 50000
                        difficulty_score: "2.5"
                        expansions: []
                    total: 1
                filtered:
                  summary: Filtered by player count and rating
                  value:
                    board_games:
                      - id: 1
                        name: Catan
                        game_types: [strategy, family]
                        game_categories: [Economic, Negotiation]
                        min_players: 3
                        max_players: 4
                        min_playing_time: 60
                        max_playing_time: 90
                        rating: "7.2"
                        rating_count: 50000
                        difficulty_score: "2.5"
                        expansions: []
                    total: 1
        '400':
          description: Bad request - Invalid IDs provided
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "No valid IDs provided"

  /api/v1/board_games/{id}:
    get:
      summary: Get board game by ID
      description: Retrieve a specific board game by its ID, including all expansions
      operationId: getBoardGameById
      tags:
        - Board Games
      parameters:
        - name: id
          in: path
          description: Board game ID
          required: true
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BoardGameDetailed'
              example:
                id: 1
                name: Catan
                game_types: [strategy, family]
                game_categories: [Economic, Negotiation]
                min_players: 3
                max_players: 4
                min_playing_time: 60
                max_playing_time: 90
                rating: "7.2"
                rating_count: 50000
                difficulty_score: "2.5"
                expansions:
                  - id: 1
                    name: "Catan: Seafarers"
                    min_players: 3
                    max_players: 4
                    min_playing_time: 60
                    max_playing_time: 90
                    rating: "7.1"
                    rating_count: 15000
                    difficulty_score: "2.6"
        '404':
          description: Board game not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Board game not found"

  /api/v1/board_games/{board_game_id}/photos:
    get:
      summary: List a game's photos
      description: List user-uploaded photos for a board game (box art, components, table setup).
      operationId: listGamePhotos
      tags:
        - Game Photos
      parameters:
        - name: board_game_id
          in: path
          required: true
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GamePhoto'
        '404':
          description: Board game not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      summary: Upload a game photo
      description: >
        Upload a photo (JPEG, PNG, WebP, or AVIF, up to 10MB) for a board game.
        A game can have at most 20 photos. No authentication (accepted tradeoff for a single-user local app).
      operationId: createGamePhoto
      tags:
        - Game Photos
      parameters:
        - name: board_game_id
          in: path
          required: true
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image:
                  type: string
                  format: binary
      responses:
        '201':
          description: Photo created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GamePhoto'
        '400':
          description: No image provided
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Board game not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Validation failed (bad type, too large, or over the per-game cap)
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: string

  /api/v1/board_games/{board_game_id}/photos/{id}:
    delete:
      summary: Delete a game photo
      operationId: deleteGamePhoto
      tags:
        - Game Photos
      parameters:
        - name: board_game_id
          in: path
          required: true
          schema:
            type: integer
            example: 1
        - name: id
          in: path
          required: true
          schema:
            type: integer
            example: 1
      responses:
        '204':
          description: Photo deleted
        '404':
          description: Board game or photo not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/board_games/search:
    get:
      summary: Search board games
      description: Search for board games by name and other criteria. Automatically imports from BGG if no local results found.
      operationId: searchBoardGames
      tags:
        - Board Games
      parameters:
        - name: name
          in: query
          description: Search for board games containing this name (case insensitive)
          required: false
          schema:
            type: string
            example: "catan"
        - name: player_count
          in: query
          description: Find games that support this exact number of players
          required: false
          schema:
            type: integer
            minimum: 1
            example: 3
        - name: playing_time
          in: query
          description: Find games that can be played in this exact time (minutes)
          required: false
          schema:
            type: integer
            minimum: 1
            example: 60
        - name: min_playing_time
          in: query
          description: Find games with minimum playing time over this limit
          required: false
          schema:
            type: integer
            minimum: 1
            example: 30
        - name: max_playing_time
          in: query
          description: Find games with maximum playing time under this limit
          required: false
          schema:
            type: integer
            minimum: 1
            example: 90
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  board_games:
                    type: array
                    items:
                      $ref: '#/components/schemas/BoardGame'
                  total:
                    type: integer
              examples:
                by_name:
                  summary: Search by name
                  value:
                    board_games:
                      - id: 1
                        name: Catan
                        game_types: [strategy, family]
                        game_categories: [Economic, Negotiation]
                        min_players: 3
                        max_players: 4
                        min_playing_time: 60
                        max_playing_time: 90
                        rating: "7.2"
                        rating_count: 50000
                        difficulty_score: "2.5"
                        expansions: []
                    total: 1
                empty:
                  summary: No results
                  value:
                    board_games: []
                    total: 0
        '400':
          description: Bad request - Empty name parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Name parameter cannot be empty"

  /up:
    get:
      summary: Health check
      description: Check if the application is running and healthy
      operationId: healthCheck
      tags:
        - Health
      responses:
        '200':
          description: Application is healthy
          content:
            text/plain:
              schema:
                type: string
                example: "Rails application is running"

components:
  schemas:
    GamePhoto:
      type: object
      properties:
        id:
          type: integer
          example: 1
        url:
          type: string
          description: Absolute URL of the full-resolution image
          example: "http://localhost:3002/rails/active_storage/blobs/redirect/.../photo.jpg"
        thumbnail_url:
          type: string
          description: Absolute URL of a small (max 400x400) variant for the gallery grid
          example: "http://localhost:3002/rails/active_storage/representations/redirect/.../photo.jpg"
    BoardGame:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "Catan"
        game_types:
          type: array
          items:
            type: string
          example: [strategy, family]
          description: Game types (strategy, family, party, abstract, thematic)
        game_categories:
          type: array
          items:
            type: string
          example: [Economic, Negotiation]
        min_players:
          type: integer
          minimum: 1
          example: 3
        max_players:
          type: integer
          minimum: 1
          example: 4
        min_playing_time:
          type: integer
          nullable: true
          minimum: 1
          example: 60
        max_playing_time:
          type: integer
          nullable: true
          minimum: 1
          example: 90
        rating:
          type: string
          nullable: true
          example: "7.2"
          description: Rating as a decimal string (0-10)
        rating_count:
          type: integer
          nullable: true
          example: 50000
          description: Number of ratings
        difficulty_score:
          type: string
          nullable: true
          example: "2.5"
          description: Difficulty score as a decimal string (0-5)
        image_url:
          type: string
          format: uri
          nullable: true
          example: "https://cf.geekdo-images.com/W3Bsga_uLP9kO91gZ7H8yw__original/img/xyz.jpg"
          description: Full-size cover image URL (from BGG)
        thumbnail_url:
          type: string
          format: uri
          nullable: true
          example: "https://cf.geekdo-images.com/W3Bsga_uLP9kO91gZ7H8yw__thumb/img/xyz.jpg"
          description: Thumbnail cover image URL (from BGG)
        expansions:
          type: array
          items:
            $ref: '#/components/schemas/Extension'
      required:
        - id
        - name
        - game_types
        - game_categories
        - min_players
        - max_players
        - expansions

    BoardGameDetailed:
      allOf:
        - $ref: '#/components/schemas/BoardGame'
        - type: object
          properties:
            description:
              type: string
              nullable: true
              description: Long-form game description from BoardGameGeek
            base_games:
              type: array
              items:
                $ref: '#/components/schemas/Extension'
            contained_games:
              type: array
              items:
                $ref: '#/components/schemas/Extension'
            containers:
              type: array
              items:
                $ref: '#/components/schemas/Extension'
            reimplemented_games:
              type: array
              items:
                $ref: '#/components/schemas/Extension'
            reimplementations:
              type: array
              items:
                $ref: '#/components/schemas/Extension'
            integrated_games:
              type: array
              items:
                $ref: '#/components/schemas/Extension'
          required:
            - base_games
            - contained_games
            - containers
            - reimplemented_games
            - reimplementations
            - integrated_games
      description: Board game with full relation details (expansions, base games, contained games, containers, reimplementations, reimplemented games, integrated games)

    Extension:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "Catan: Seafarers"
        year_published:
          type: integer
          example: 1997
        min_players:
          type: integer
          minimum: 1
          example: 3
        max_players:
          type: integer
          minimum: 1
          example: 4
        min_playing_time:
          type: integer
          nullable: true
          minimum: 1
          example: 60
        max_playing_time:
          type: integer
          nullable: true
          minimum: 1
          example: 90
        rating:
          type: string
          nullable: true
          example: "7.1"
        rating_count:
          type: integer
          nullable: true
          example: 15000
          description: Number of ratings
        difficulty_score:
          type: string
          nullable: true
          example: "2.6"
        image_url:
          type: string
          format: uri
          nullable: true
        thumbnail_url:
          type: string
          format: uri
          nullable: true
      required:
        - id
        - name
        - min_players
        - max_players

    Error:
      type: object
      properties:
        error:
          type: string
          example: "Board game not found"
      required:
        - error

tags:
  - name: Board Games
    description: Operations for managing and searching board games
  - name: Health
    description: Health check endpoints
